<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Publications — Anna Siebenbrunner</title>
  <meta name="description" content="Peer-reviewed publications by Anna Siebenbrunner, loaded live from ORCID.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar"></aside>
    <main>
      <div class="topbar"></div>

      <h1 class="page-title">Publications</h1>
      <p class="page-intro">Pulled live from my
        <a href="https://orcid.org/" target="_blank" rel="noopener" id="orcid-link">ORCID</a>
        record and enriched with author details from Crossref, so it stays current automatically.</p>

      <div id="pub-status" class="pub-status"></div>
      <div id="pub-list" class="pub-list"></div>
    </main>
  </div>

  <footer class="site">© <span id="year"></span> Anna Siebenbrunner · Built with GitHub Pages</footer>

  <script src="/assets/js/site.js"></script>
  <script src="/assets/js/publications.js"></script>
  <script>
    // point the intro ORCID link at the configured iD
    document.addEventListener("DOMContentLoaded", () => {
      const a = document.getElementById("orcid-link");
      if (a && typeof SITE !== "undefined") a.href = "https://orcid.org/" + SITE.orcid;
    });
  </script>
</body>
</html>
