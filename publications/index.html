<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Publications – Anna Siebenbrunner</title>
  <meta name="description" content="Peer-reviewed publications by Anna Siebenbrunner, loaded live from ORCID.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
</head>
<body>
  <div class="layout">
    <aside class="sidebar"></aside>
    <main>
      <div class="topbar"></div>

      <h1 class="page-title">Publications</h1>

      <div id="pub-status" class="pub-status"></div>
      <div id="pub-list" class="pub-list"></div>

      <section class="section" style="margin-top:44px">
        <h3>Talks &amp; Presentations</h3>
        <div id="talks"></div>
      </section>

      <p class="note">The publication list above is pulled live from my
        <a href="https://orcid.org/" target="_blank" rel="noopener" id="orcid-link">ORCID</a>
        record and enriched with author details from Crossref, so it stays current automatically.
        Talks are maintained in <code>assets/data/talks.csv</code>.</p>
    </main>
  </div>

  <footer class="site">© <span id="year"></span> Anna Siebenbrunner · Built with GitHub Pages</footer>

  <script src="/assets/js/site.js"></script>
  <script src="/assets/js/publications.js"></script>
  <script src="/assets/js/talks.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const a = document.getElementById("orcid-link");
      if (a && typeof SITE !== "undefined") a.href = "https://orcid.org/" + SITE.orcid;
    });
  </script>
</body>
</html>
